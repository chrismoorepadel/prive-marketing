<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V7WWTFXWSE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-V7WWTFXWSE');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privé Padel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#1B2A4A; --gold:#B8976A; --cream:#F5F0E8; --mid:#8A7F72; }
    body {
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
    }
    .lock-wrap {
      text-align: center;
      padding: 48px 32px;
      max-width: 420px;
      width: 100%;
    }
    .lock-logo {
      height: 96px;
      width: auto;
      margin-bottom: 48px;
    }
    .lock-eyebrow {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }
    .lock-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 40px;
    }
    .lock-heading em { font-style: italic; }
    .lock-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .lock-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.06em;
      padding: 16px 20px;
      outline: none;
      transition: border-color .3s;
      text-align: center;
    }
    .lock-input::placeholder { color: rgba(255,255,255,0.3); }
    .lock-input:focus { border-color: var(--gold); }
    .lock-btn {
      width: 100%;
      background: var(--gold);
      border: none;
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding: 18px;
      cursor: pointer;
      transition: opacity .3s;
    }
    .lock-btn:hover { opacity: 0.85; }
    .lock-message {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .lock-error {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(184,151,106,0.8);
      margin-top: 4px;
      display: none;
    }
    .lock-error.visible { display: block; }
  </style>
</head>
<body>
  <div class="lock-wrap">
    <img class="lock-logo" src="https://res.cloudinary.com/dfjqa5f05/image/upload/q_auto,f_auto/v1773187744/logo_light_nloide.png" alt="Privé Padel">
    <div class="lock-eyebrow">Private Preview</div>
    <h1 class="lock-heading">Enter password<br><em>to continue.</em></h1>
    <p class="lock-message">Something new from Privé Padel.<br>Returning May 4, 2026.</p>
    <form class="lock-form" method="POST" action="/api/auth">
      <input class="lock-input" type="password" name="password" placeholder="Password" autocomplete="current-password" autofocus>
      <p class="lock-error" id="lockError">Incorrect password — please try again.</p>
      <button class="lock-btn" type="submit">Enter →</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('lockError').classList.add('visible');
    }
  </script>
</body>
</html>
